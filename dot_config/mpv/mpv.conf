# Hardware decoding (auto-select best method)
hwdec=auto

# Save position on quit — resume where you left off
save-position-on-quit=yes

# Keep the player open when a file ends (useful for playlists)
keep-open=yes

# Automatically load all files in the directory as a playlist
autocreate-playlist=same

# Volume defaults
volume=80
volume-max=150

# OSD (on-screen display)
osd-level=1
osd-duration=2500
osd-font-size=32

# Subtitles
sub-auto=fuzzy
sub-font-size=40

# Screenshots
screenshot-format=png
screenshot-directory=~/Pictures/mpv-screenshots

# Use gpu-next video output for modern Wayland support
vo=gpu-next
gpu-api=vulkan
