general {
    lock_cmd = omarchy-lock-screen                         # lock screen and 1password
    before_sleep_cmd = loginctl lock-session               # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on             # to avoid having to press a key twice to turn on the display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

listener {
    timeout = 150                                             # 2.5min
    # Only start screensaver if not on AC power (battery only)
    on-timeout = test "$(cat /sys/class/power_supply/ACAD/online)" = "0" && (pidof hyprlock || omarchy-launch-screensaver)
}

listener {
    timeout = 300                      # 5min
    # Only lock screen if not on AC power (battery only)
    on-timeout = test "$(cat /sys/class/power_supply/ACAD/online)" = "0" && loginctl lock-session
}

listener {
    timeout = 330                                            # 5.5min
    # Only turn off screen if not on AC power (battery only)
    on-timeout = test "$(cat /sys/class/power_supply/ACAD/online)" = "0" && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r # screen on when activity is detected
}
