# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Laptop screen on the left
monitor = eDP-1, 2560x1600@165, 0x0, 1.60

# LG Ultrawide (top of stack) - positioned to the right of laptop
# Laptop effective width = 2560/1.60 = 1600px
# Y position = -1440 to place it above the Alienware
monitor = DVI-I-2, 3440x1440@60, 1600x-1440, 1

# Dell Alienware (bottom of stack) - positioned below LG
# Y position = 0 (baseline)
monitor = DVI-I-1, 3440x1440@60, 1600x0, 1

# Fallback for any other displays
monitor = , preferred, auto, auto

env = GDK_SCALE,2
